<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> MediosHTML</title>
    </head>
    <body>
        <h1>Ejemplo de medios HTML</h1>

        <h2>Imagen</h2>
        <img src="Imagen1.png"
        alt="Sapo parado en la playa" width="200">

        <h2>Video</h2>
        <video width="200" controls>
            <source src="Video1.mp4" type="video/mp4">
            Tu navegador no soporta el elemento de video.
        </video>

        <h2>Audio</h2>
        <audio controls>
            <source src="Audio1.mp3" type="audio/mpeg">
            Tu navegador no soporta el elemento de audio.
        </audio>

        <h2>Enlaces</h2>
        <p><a href="https://www.google.com"> Ir a google (misma pestaña)</a></p>
        <p><a href="https://www.google.com" target="_blank"> Ir a google (nueva pestaña)</a></p>

    </body>
    </html>
